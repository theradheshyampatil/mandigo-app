name: 'CI - Build & Push Frontend'

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: mandigo-frontend
  GITOPS_REPO: theradheshyampatil/mandigo-gitops
  DEPLOYMENT_FILE: k8s/frontend/deployment.yaml
  # Monorepo: the Vite/React app lives in ./frontend
  BUILD_CONTEXT: ./frontend
  DOCKERFILE: ./frontend/Dockerfile
  # PR #8: point the SPA at the real backend at build time. Vite inlines
  # this into the static bundle as `import.meta.env.VITE_API_URL`.
  # To roll back to mocks, set this to an empty string here.
  VITE_API_URL: https://api.projectbyradhe.xyz/api/v1

jobs:
  # ---------------------------------------------------------------------------
  # Build the Vite/React SPA into a Docker image and push it to ECR with both
  # a unique :<sha> tag and a rolling :latest tag.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to Amazon ECR
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Export full image URI for downstream jobs
        id: image
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Image pushed::${IMAGE_URI}"

  # ---------------------------------------------------------------------------
  # Auto-bump the image tag in mandigo-gitops/k8s/frontend/deployment.yaml
  # so ArgoCD picks up the new build without any manual SSH/vi steps.
  # ---------------------------------------------------------------------------
  update-gitops:
    name: Bump GitOps deployment manifest
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mandigo-gitops
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          ref: main
          persist-credentials: true

      - name: Update deployment.yaml image tag
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          set -euo pipefail

          echo "New image URI: ${IMAGE_URI}"
          echo "Target file:   ${DEPLOYMENT_FILE}"
          echo ""
          echo "--- BEFORE ---"
          grep -E "^\s+image:" "${DEPLOYMENT_FILE}" || true

          # Match any line of the form `image: <registry>/mandigo-frontend:<tag>`
          # and rewrite the WHOLE line with the new full URI. Uses '|' as the
          # sed delimiter so we don't have to escape '/' in the URI.
          sed -i -E "s|^(\s*image:\s*).*/${ECR_REPOSITORY}:.*$|\1${IMAGE_URI}|" "${DEPLOYMENT_FILE}"

          echo ""
          echo "--- AFTER ---"
          grep -E "^\s+image:" "${DEPLOYMENT_FILE}"

          # If sed couldn't find the pattern, the file is unchanged. Fail loudly.
          if ! grep -qF "${IMAGE_URI}" "${DEPLOYMENT_FILE}"; then
            echo "::error::Failed to update image tag in ${DEPLOYMENT_FILE}"
            exit 1
          fi

      - name: Commit and push
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          COMMIT_MSG_BODY: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          git add "${DEPLOYMENT_FILE}"

          if git diff --staged --quiet; then
            echo "::notice::deployment.yaml already at this image tag — nothing to commit"
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          git commit -m "deploy(frontend): bump to ${SHORT_SHA}" \
                     -m "Source commit: ${GITHUB_SHA}" \
                     -m "Source repo: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" \
                     -m "Image: ${IMAGE_URI}" \
                     -m "Triggered by:" \
                     -m "${COMMIT_MSG_BODY}"

          git push origin main

          echo "::notice title=GitOps bumped::ArgoCD should sync within ~30s"

      - name: Print deploy summary
        if: always()
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          echo "===================================================================="
          echo " Auto-deploy chain status"
          echo "===================================================================="
          echo ""
          echo " Image:        ${IMAGE_URI}"
          echo " GitOps repo:  https://github.com/${GITOPS_REPO}"
          echo " Manifest:     ${DEPLOYMENT_FILE}"
          echo ""
          echo " What happens next (without any manual action):"
          echo "   1. ArgoCD detects the gitops commit (~30s polling cycle)"
          echo "   2. K3s rolls the deployment"
          echo "   3. ecr-sync.sh has already pre-pulled the image (cron, every 10 min)"
          echo "      so the pod starts cleanly without K3s hitting ECR auth"
          echo ""
          echo " Live site: https://projectbyradhe.xyz"
          echo "===================================================================="
