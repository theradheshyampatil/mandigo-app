name: 'CI - Build & Push Frontend'

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to Amazon ECR
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/mandigo-frontend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/mandigo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Print GitOps update instructions
        run: |
          echo "===================================================================="
          echo " Image pushed to ECR successfully."
          echo "===================================================================="
          echo ""
          echo " New image tag:"
          echo "   ${{ steps.login-ecr.outputs.registry }}/mandigo-frontend:${{ github.sha }}"
          echo ""
          echo " Next step (GitOps):"
          echo "   1. Open mandigo-gitops/k8s/frontend/deployment.yaml"
          echo "   2. Replace the 'image:' line with the tag above"
          echo "   3. git commit + push -> ArgoCD will sync"
          echo ""
          echo " Note: EC2 cronjob (ecr-sync.sh) pre-pulls new images every 10 min."
          echo "       If ArgoCD shows ImagePullBackOff briefly, wait one cron cycle."
          echo "===================================================================="
