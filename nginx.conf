# =============================================================================
# MandiGo Frontend - Nginx config
# Serves a Vite-built React SPA with:
#   - History-API fallback (so React Router deep links work)
#   - Long-cache headers on hashed assets (Vite emits content-hashed filenames)
#   - Gzip compression
#   - A /healthz endpoint for K8s probes
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---- Hashed static assets: cache hard ----
    # Vite emits files like /assets/index-abc123.js with content hashes,
    # so they're safe to cache for a long time.
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Health check for K8s liveness/readiness probes ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- index.html: always revalidate ----
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ---- SPA fallback ----
    # Any unknown path returns index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
